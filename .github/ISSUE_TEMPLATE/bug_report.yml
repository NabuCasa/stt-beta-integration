---
name: "Bug report"
description: "Report a bug with the STT Beta integration"
body:
  - type: markdown
    attributes:
      value: |
        Before you open a new bug report, search through [existing issues](https://github.com/NabuCasa/stt-beta-integration/issues) to see if it has already been reported.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have filled out this template to the best of my ability.
          required: true

  - type: input
    attributes:
      label: "Home Assistant version"
      description: "The version of Home Assistant you are running."
      placeholder: "e.g. 2025.2.4"
    validations:
      required: true

  - type: input
    attributes:
      label: "Integration version"
      description: "The version of the STT Beta integration (from HACS or manifest.json)."
      placeholder: "e.g. 0.0.1"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Description"
      description: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Steps to reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Expected behavior"
      description: "What you expected to happen."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Actual behavior"
      description: "What actually happened."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Relevant log output"
      description: "Paste any relevant log output (enable debug logging for `custom_components.stt_beta`)."
      render: text
    validations:
      required: false

  - type: textarea
    attributes:
      label: "Additional context"
      description: "Any other context, screenshots, or information."
    validations:
      required: false
