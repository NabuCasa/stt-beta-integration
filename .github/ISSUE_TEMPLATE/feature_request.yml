---
name: "Feature request"
description: "Suggest an idea for this project"
body:
  - type: markdown
    attributes:
      value: |
        Before you open a new feature request, search through [existing feature requests](https://github.com/NabuCasa/stt-beta-integration/issues?q=is%3Aissue+label%3A%22Feature+Request%22+) to see if others have had the same idea.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have filled out the template to the best of my ability.
          required: true
        - label: This only contains 1 feature request (if you have multiple, open one for each).
          required: true
        - label: This is not a duplicate of an existing feature request.
          required: true

  - type: textarea
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      description: "A clear and concise description of what the problem is."
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Additional context"
      description: "Add any other context or screenshots about the feature request here."
    validations:
      required: false
